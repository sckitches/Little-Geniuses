<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Switch Profile - Little Genius Academyes</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="logo.png">
    <style>
        .auth-container {
            max-width: 550px;
            margin: 4rem auto;
            background: white;
            padding: 3rem;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 10px solid var(--purple);
        }
        .profile-list {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .profile-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.5rem;
            background: #f8fafc;
            border-radius: 20px;
            border: 4px solid #f1f5f9;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s, background 0.2s;
        }
        .profile-card:hover {
            transform: scale(1.02);
            border-color: var(--purple);
            background: rgba(95,39,205,0.05);
        }
        .btn-add {
            width: 100%;
            padding: 1rem;
            background: #f0fdf4;
            color: #166534;
            border: 4px dashed #1dd1a1;
            border-radius: 15px;
            font-size: 1.2rem;
            font-family: 'Fredoka One';
            cursor: pointer;
            margin-top: 3rem;
            transition: background 0.2s;
        }
        .btn-add:hover {
            background: #dcfce7;
        }
    </style>
</head>
<body class="bg-clouds bg-purple">
    <div class="container text-center">
        <div class="auth-container">
            <img src="logo.png" alt="Little Genius Academy" class="logo-img" style="margin-bottom: 5px; height: 100px;">
            <h1 class="rainbow-text" style="font-size: 3.5rem; margin-bottom: 0.5rem;">Who is Playing?</h1>
            <p style="margin-bottom: 2rem; color: #666; font-family: 'Quicksand'; font-size: 1.2rem;">Pick a profile or create a new one!</p>
            
            <div id="profilesList" class="profile-list">
                <!-- Generated by JS -->
            </div>

            <button class="btn-add" onclick="window.location.href='signup.html'">+ Add New Genius! 👶</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        const profileContainer = document.getElementById('profilesList');
        const profilesList = JSON.parse(localStorage.getItem('geniusProfiles') || '[]');

        if (profilesList.length === 0) {
            window.location.href = 'signup.html';
        }

        profilesList.forEach((profile, index) => {
            const card = document.createElement('div');
            card.className = "profile-card";
            card.style.position = "relative";
            card.onclick = (e) => {
                if(e.target.closest('.delete-btn')) return; // Don't login if clicking delete
                selectProfile(index);
                createConfetti(card);
            };

            card.innerHTML = `
                <div style="text-align: left;">
                    <div style="font-size: 1.8rem; color: var(--purple); font-family: 'Fredoka One';">
                        ${profile.childName} 👶
                    </div>
                    <div style="font-size: 1rem; color: #64748b; font-family: 'Quicksand'; font-weight: bold;">
                        ${profile.parentName}'s Genius
                    </div>
                </div>
                <div style="display:flex; gap:15px; align-items:center;">
                    <button class="delete-btn" onclick="removeProfile(event, ${index})" style="background:#ff7675; border:none; border-radius:10px; padding:10px; font-size:1.2rem; cursor:pointer; color:white; transition:0.3s;" title="Delete Profile">🗑️</button>
                    <div style="background: var(--purple); color: white; border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">
                        ▶
                    </div>
                </div>
            `;
            profileContainer.appendChild(card);
        });

        function removeProfile(event, index) {
            event.stopPropagation();
            
            // Themed confirmation
            const profileName = profilesList[index].childName;
            if(confirm(`Are you sure you want to say goodbye to ${profileName}'s profile? 😢`)) {
                const list = JSON.parse(localStorage.getItem('geniusProfiles') || '[]');
                const deletedProfileId = list[index].id;
                
                list.splice(index, 1);
                localStorage.setItem('geniusProfiles', JSON.stringify(list));
                
                // If we deleted the active profile, clear it
                const current = JSON.parse(localStorage.getItem('currentGeniusProfile'));
                if (current && current.id === deletedProfileId) {
                    localStorage.removeItem('currentGeniusProfile');
                }
                
                // Visual feedback
                const card = event.target.closest('.profile-card');
                card.style.transition = '0.5s';
                card.style.opacity = '0';
                card.style.transform = 'translateX(100px)';
                
                speak(`Goodbye ${profileName}!`);
                
                setTimeout(() => {
                    if (list.length === 0) {
                        window.location.href = 'signup.html';
                    } else {
                        location.reload();
                    }
                }, 600);
            }
        }
    </script>
</body>
</html>
