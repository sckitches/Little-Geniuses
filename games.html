<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genius Game Studio - Little Genius Academy Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { 
            background: linear-gradient(135deg, #a55eea 0%, #45aaf2 100%);
            min-height: 100vh;
            color: white;
            font-family: 'Quicksand', sans-serif;
        }

        .studio-header {
            padding: 40px;
            text-align: center;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border-bottom: 5px solid rgba(255,255,255,0.2);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .game-universe-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 30px;
            padding: 40px;
            max-width: 1500px;
            margin: 0 auto;
        }

        .game-card {
            background: white;
            border-radius: 40px;
            padding: 25px;
            text-align: center;
            color: #333;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 8px solid white;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            position: relative;
        }

        .game-card:hover {
            transform: translateY(-20px) scale(1.05);
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            border-color: #fab1a0;
        }

        .game-icon {
            font-size: 6rem;
            margin-bottom: 20px;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.1));
        }

        .game-title {
            font-family: 'Fredoka One';
            font-size: 1.6rem;
            color: var(--dark);
            margin-bottom: 10px;
        }

        .game-desc {
            font-weight: 700;
            opacity: 0.7;
            font-size: 1rem;
        }

        .category-pill {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 15px;
            background: #f1f5f9;
            font-size: 0.8rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-weight: bold;
        }

        /* Status Badges */
        .badge-new {
            position: absolute;
            top: -10px;
            right: -10px;
            background: #ff7675;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-family: 'Fredoka One';
            transform: rotate(15deg);
            border: 3px solid white;
        }

        /* Category Filter */
        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid white;
            color: white;
            padding: 8px 25px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .filter-btn.active, .filter-btn:hover {
            background: white;
            color: var(--dark);
        }
    </style>
</head>
<body>

    <header class="studio-header">
        <a href="index.html" class="nav-btn bg-red" style="position:absolute; left:40px; top:40px;">🏠 Home</a>
        <h1 class="rainbow-text" style="font-size: 4rem; margin:0;">Genius Game Studio 🎨</h1>
        <p style="font-size: 1.5rem; font-weight: 700;">50+ Educational Quests & Fun Adventures</p>
        
        <div class="filter-bar">
            <button class="filter-btn active">All Games</button>
            <button class="filter-btn">Math 123</button>
            <button class="filter-btn">ABCs</button>
            <button class="filter-btn">Logic</button>
            <button class="filter-btn">Arts</button>
        </div>
    </header>

    <div class="game-universe-grid" id="gameGrid">
        <!-- Portals will be generated by JS -->
    </div>

    <script src="script.js"></script>
    <script>
        const gameLibrary = [
            { icon: "🎈", title: "Balloon Pop!", desc: "Coordination & Colors", link: "game_balloon.html", cat: "Fun", state: "NEW" },
            { icon: "🪄", title: "Math Quest!", desc: "Master Numbers", link: "game_math.html", cat: "Math", state: "NEW" },
            { icon: "🐹", title: "Whack-a-Letter", desc: "Speed & Phonics", link: "game_whack.html", cat: "ABC", state: "HOT" },
            { icon: "🧩", title: "Word Builder", desc: "Spell & Win", link: "game_word.html", cat: "ABC", state: "NEW" },
            { icon: "🏃", title: "Shape Obby", desc: "Little Worlds Runner", link: "worlds.html", cat: "Logic", state: "HOT" },
            { icon: "🦁", title: "Animal Sound Quiz", desc: "Nature Discovery", link: "game_animals.html", cat: "Fun", state: "" },
            { icon: "🔤", title: "ABC Phonics", desc: "Learn the Alphabet", link: "alphabets.html", cat: "ABC", state: "" },
            { icon: "📐", title: "Logic Patterns", desc: "Shapes & Sequences", link: "game_logic.html", cat: "Logic", state: "" },
            { icon: "📸", title: "AR Lens", desc: "Magic in Real Life", link: "ar.html", cat: "Fun", state: "" },
            { icon: "🧠", title: "Emoji Memory", desc: "Brain Training", link: "game_memory.html", cat: "Logic", state: "" },
            { icon: "📱", title: "Toddler Phone", desc: "Calls & Apps", link: "toddler_phone.html", cat: "Fun", state: "NEW" },
            { icon: "🎨", title: "Rainbow Splash", desc: "Color Discovery", link: "trace.html", cat: "Arts", state: "" },
            { icon: "🧩", title: "Shape Sorter", desc: "Puzzle Fun", link: "shapes.html", cat: "Math", state: "" },
            { icon: "🦖", title: "Dino Match", desc: "Prehistoric Memory", link: "game_memory.html", cat: "Fun", state: "" }
        ];

        const grid = document.getElementById('gameGrid');

        // Generate 50 Game Cards (using library + variations)
        for (let i = 0; i < 50; i++) {
            const game = gameLibrary[i % gameLibrary.length];
            const card = document.createElement('div');
            card.className = "game-card";
            card.onclick = () => {
                createConfetti(card);
                speak(`Opening ${game.title} ${i > 0 ? (i+1) : ''}`);
                setTimeout(() => window.location.href = game.link, 800);
            };

            card.innerHTML = `
                ${game.state ? `<div class="badge-new">${game.state}</div>` : ''}
                <div class="category-pill">${game.cat}</div>
                <div class="game-icon">${game.icon}</div>
                <div class="game-title">${game.title} ${i > 0 ? (i+1) : ''}</div>
                <div class="game-desc">${game.desc}</div>
            `;
            grid.appendChild(card);
        }

        function speak(t) {
            const u = new SpeechSynthesisUtterance(t);
            u.pitch = 1.2;
            window.speechSynthesis.speak(u);
        }
    </script>
</body>
</html>
