<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counting Fruit - Little Genius Academyes</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .fruit-container {
            min-height: 200px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            background: white;
            padding: 2rem;
            border-radius: 30px;
            margin: 2rem 0;
            border: 5px dashed var(--green);
        }
        .fruit {
            font-size: 5rem;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .fruit:hover {
            transform: scale(1.2);
        }
        .options-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }
    </style>
</head>
<body class="bg-clouds bg-green">
    <nav class="top-nav">
        <div class="logo">
            <span class="mascot" onclick="window.location.href='index.html'">🐵</span> Little Genius Academyes
        </div>
        <div class="nav-links">
            <a href="games.html" class="nav-btn bg-red">⬅ Back to Games</a>
        </div>
    </nav>

    <main class="container text-center">
        <h1 class="rainbow-text" style="font-size: 3rem; color: white; margin-top: 1rem;">Counting Fruit 🍎</h1>
        <p style="color: white; font-family: 'Quicksand'; font-size: 1.5rem;">How many <span id="targetFruitName">Apples</span> can you see?</p>

        <div class="fruit-container" id="fruitBox"></div>

        <div class="options-grid" id="optionsBox"></div>

        <h2 id="feedback" style="color: white; margin-top: 2rem; min-height: 3rem;"></h2>
    </main>

    <script src="script.js"></script>
    <script>
        const fruitList = [
            { emoji: '🍎', name: 'Apples' },
            { emoji: '🍌', name: 'Bananas' },
            { emoji: '🍇', name: 'Grapes' },
            { emoji: '🍓', name: 'Strawberries' },
            { emoji: '🍊', name: 'Oranges' },
            { emoji: '🍉', name: 'Watermelons' }
        ];

        let correctCount = 0;

        function nextRound() {
            const fruit = fruitList[Math.floor(Math.random() * fruitList.length)];
            correctCount = Math.floor(Math.random() * 9) + 1; // 1 to 9
            
            document.getElementById('targetFruitName').innerText = fruit.name;
            document.getElementById('feedback').innerText = '';
            
            const fruitBox = document.getElementById('fruitBox');
            fruitBox.innerHTML = '';
            for(let i=0; i<correctCount; i++) {
                const el = document.createElement('div');
                el.className = 'fruit scale-hover';
                el.innerText = fruit.emoji;
                el.onclick = () => {
                    createConfetti(el);
                    // Single sound or shake
                };
                fruitBox.appendChild(el);
            }

            // Generate options
            const options = new Set([correctCount]);
            while(options.size < 3) {
                options.add(Math.floor(Math.random() * 9) + 1);
            }
            const sortedOptions = Array.from(options).sort();

            const optionsBox = document.getElementById('optionsBox');
            optionsBox.innerHTML = '';
            sortedOptions.forEach(num => {
                const btn = document.createElement('button');
                btn.className = "nav-btn bg-yellow";
                btn.style.fontSize = "3rem";
                btn.style.padding = "1rem 3rem";
                btn.style.border = "none";
                btn.style.color = "var(--dark)";
                btn.innerText = num;
                btn.onclick = () => checkAnswer(num, btn);
                optionsBox.appendChild(btn);
            });
        }

        function checkAnswer(num, btn) {
            if (num === correctCount) {
                document.getElementById('feedback').innerText = '🌟 Correct! You are a Math Genius! 🌟';
                createConfetti(btn);
                btn.classList.replace('bg-yellow', 'bg-green');
                setTimeout(nextRound, 1500);
            } else {
                document.getElementById('feedback').innerText = 'Oops! Try again! 🎨';
                btn.classList.replace('bg-yellow', 'bg-red');
                setTimeout(() => btn.classList.replace('bg-red', 'bg-yellow'), 1000);
            }
        }

        nextRound();
    </script>
</body>
</html>
