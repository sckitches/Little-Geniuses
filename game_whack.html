<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whack-a-Letter - Genius Game Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #55efc4; color: #2d3436; text-align: center; }
        .game-header { padding: 20px; background: white; border-bottom: 5px solid #00b894; }
        
        .whack-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 40px;
            max-width: 600px;
            margin: 0 auto;
        }

        .hole {
            height: 150px;
            background: #b8e994;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            border: 8px solid #78e08f;
            box-shadow: inset 0 10px 0 rgba(0,0,0,0.1);
        }

        .letter-mole {
            width: 100px;
            height: 100px;
            background: #ff7675;
            color: white;
            font-family: 'Fredoka One';
            font-size: 4rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: absolute;
            bottom: -100%;
            left: 50%;
            transform: translateX(-50%);
            transition: bottom 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            border: 5px solid white;
            box-shadow: 0 10px 0 #d63031;
        }

        .letter-mole.up {
            bottom: 20px;
        }

        #scoreBoard { 
            font-family: 'Fredoka One'; 
            font-size: 2.5rem; 
            background: #00b894; 
            color: white; 
            padding: 10px 30px; 
            border-radius: 50px; 
            display: inline-block;
            margin-top: 20px;
        }

        .start-btn {
            font-size: 2rem;
            padding: 1rem 3rem;
            background: #ff7675;
            color: white;
            border: none;
            border-radius: 50px;
            font-family: 'Fredoka One';
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 10px 0 #d63031;
        }
        .start-btn:active { transform: translateY(10px); box-shadow: 0 0 0 #d63031; }
    </style>
</head>
<body>

    <header class="game-header">
        <a href="games.html" class="nav-btn bg-dark" style="float:left;">⬅ Games</a>
        <h1 class="rainbow-text" style="font-size: 3rem;">Whack-a-Letter! 🐹</h1>
    </header>

    <div id="scoreBoard">⭐ 0</div>
    <br>
    <button class="start-btn" onclick="startGame()">START GAME!</button>

    <div class="whack-grid">
        <div class="hole"><div class="letter-mole" onclick="whack(this)">A</div></div>
        <div class="hole"><div class="letter-mole" onclick="whack(this)">B</div></div>
        <div class="hole"><div class="letter-mole" onclick="whack(this)">C</div></div>
        <div class="hole"><div class="letter-mole" onclick="whack(this)">D</div></div>
        <div class="hole"><div class="letter-mole" onclick="whack(this)">E</div></div>
        <div class="hole"><div class="letter-mole" onclick="whack(this)">F</div></div>
        <div class="hole"><div class="letter-mole" onclick="whack(this)">G</div></div>
        <div class="hole"><div class="letter-mole" onclick="whack(this)">H</div></div>
        <div class="hole"><div class="letter-mole" onclick="whack(this)">I</div></div>
    </div>

    <script>
        let score = 0;
        let jumping = false;
        const moles = document.querySelectorAll('.letter-mole');
        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

        function randomTime(min, max) { return Math.round(Math.random() * (max - min) + min); }
        function randomMole(moles) {
            const idx = Math.floor(Math.random() * moles.length);
            return moles[idx];
        }

        function peep() {
            if(!jumping) return;
            const time = randomTime(800, 1500);
            const mole = randomMole(moles);
            mole.innerText = alphabet[Math.floor(Math.random() * alphabet.length)];
            mole.classList.add('up');
            setTimeout(() => {
                mole.classList.remove('up');
                if(jumping) peep();
            }, time);
        }

        function startGame() {
            score = 0;
            document.getElementById('scoreBoard').innerText = "⭐ " + score;
            jumping = true;
            peep();
            speak("Ready? Go! Whack the letters!");
            setTimeout(() => {
                jumping = false;
                speak(`Time's up! You whacked ${score} letters! Great job!`);
                alert("Game Over! Score: " + score);
            }, 30000);
        }

        function whack(e) {
            if(!e.classList.contains('up')) return;
            score++;
            e.classList.remove('up');
            document.getElementById('scoreBoard').innerText = "⭐ " + score;
            speak(e.innerText);
            // Confetti or effect
        }

        function speak(t) {
            const u = new SpeechSynthesisUtterance(t);
            u.pitch = 1.2;
            window.speechSynthesis.speak(u);
        }
    </script>
</body>
</html>
