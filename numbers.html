<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numbers - Little Genius Academyes</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 1.5rem;
            margin-top:2rem;
        }
        .number-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            text-align: center;
            border: 4px solid white;
            cursor: pointer;
            padding: 2rem 0;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .number-card:hover { transform: scale(1.1) rotate(5deg); }
    </style>
</head>
<body class="bg-clouds bg-yellow">
    <!-- Navigation -->
    <nav class="top-nav">
        <a href="index.html" class="logo">
            <img src="logo.png" alt="Little Genius Academy Academy Logo" class="logo-img">
            Little Genius Academy
        </a>
        <div class="nav-links">
            <a href="index.html" class="nav-btn bg-red">Home</a>
            <a href="alphabets.html" class="nav-btn bg-orange">ABC</a>
            <a href="numbers.html" class="nav-btn bg-yellow">123</a>
            <a href="animals.html" class="nav-btn bg-green">Animals</a>
            <a href="dashboard.html" class="nav-btn bg-dark">Parents</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container">
        <header class="text-center" style="margin: 2rem 0;">
            <h1 class="rainbow-text" style="font-size:3rem; color:white;">Counting 1 to 100</h1>
            <h2 style="color:white; font-family:'Quicksand'">Tap ANY number to count to the stars!</h2>
        </header>

        <!-- Dynamic Numbers Grid -->
        <div id="numbersGrid" class="grid-container">
            <!-- Numbers 1-100 will be generated here by Javascript -->
        </div>

    </main>
    <script src="script.js"></script>
</body>
</html>
