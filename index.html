<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Little Genius Academy Academy - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="logo.png">
</head>
<body class="bg-clouds">
    <!-- Floating background elements -->
    <div class="floating-shape" style="top: 10%; left: 5%;">⭐</div>
    <div class="floating-shape" style="top: 20%; right: 10%;">A</div>
    <div class="floating-shape" style="top: 70%; left: 15%;">3</div>
    <div class="floating-shape" style="top: 60%; right: 5%;">🔺</div>

    <!-- Navigation -->
    <nav class="top-nav">
        <a href="index.html" class="logo">
            <img src="logo.png" alt="Little Genius Academy Academy Logo" class="logo-img">
            Little Genius Academy Academy
        </a>
        <div class="nav-links">
            <a href="index.html" class="nav-btn bg-red">Home</a>
            <a href="alphabets.html" class="nav-btn bg-orange">ABC</a>
            <a href="numbers.html" class="nav-btn bg-yellow">123</a>
            <a href="animals.html" class="nav-btn bg-green">Animals</a>
            <a href="shapes.html" class="nav-btn bg-blue">Shapes</a>
            <button class="menu-toggle" onclick="toggleMenu()">More ▼</button>
        </div>
        <!-- Extended menu -->
        <div class="dropdown-menu" id="extendedMenu">
            <a href="songs.html" class="nav-btn bg-purple">Songs</a>
            <a href="games.html" class="nav-btn bg-pink">Games</a>
            <a href="story.html" class="nav-btn bg-teal">Story</a>
            <a href="ar.html" class="nav-btn bg-orange">AR Mode</a>
            <a href="routine.html" class="nav-btn bg-blue">Daily Routine</a>
            <a href="dashboard.html" class="nav-btn bg-dark">Parents</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container">
        
        <!-- Welcome Hero -->
        <section class="hero text-center bounce-in">
            <h1 class="rainbow-text">Hi <span class="child-name">Little Genius Academy</span>!</h1>
            <h2>Ready to Learn & Play? 🎨</h2>
            <div class="mascot-large wave-animation" onclick="location.href='character.html'" style="cursor:pointer;" title="Change Hero">🐵</div>
            <p style="font-size: 1.5rem; color: #444; font-family: 'Quicksand', sans-serif;">Tap your hero to change characters!</p>
            <button class="nav-btn bg-red" onclick="logout()" style="margin-top:2rem; border:none; color:white; font-size:1.1rem;">Not <span class="child-name">you</span>? Switch Profile 🔄</button>
        </section>


        <!-- Today's Learning Card -->
        <section class="learning-grid" id="mainGrid">
            <!-- Dynamic Content based on Age -->
        </section>

    </main>
    <script src="script.js"></script>
    <script>

        document.addEventListener('DOMContentLoaded', () => {
            refreshHUD();
            const grid = document.getElementById('mainGrid');
            const ageGroup = getAgeGroup();
            
            let content = '';
            if(ageGroup === 'toddler') {
                content = `
                    <div class="feature-card scale-hover" onclick="location.href='toddler_phone.html'">
                        <div class="card-header bg-teal">Toddler Phone</div>
                        <div class="card-body"><h1>📱</h1><p>Call Mom & Dad!</p><button class="btn-play bg-teal">Open Phone 📞</button></div>
                    </div>
                    <div class="feature-card scale-hover">
                        <div class="card-header bg-red">Bright Color</div>
                        <div class="card-body"><div style="width:80px;height:80px;background:red;margin:1rem auto;border-radius:20px;"></div><p>This is RED!</p><button class="btn-play bg-red">Say Red 🔊</button></div>
                    </div>
                    <div class="feature-card scale-hover">
                        <div class="card-header bg-purple">Happy Song</div>
                        <div class="card-body"><h1>🎵</h1><p>Twinkle Twinkle</p><button class="btn-play bg-purple" onclick="location.href='songs.html'">Sing Along! 🎤</button></div>
                    </div>
                `;
            } else if (ageGroup === 'junior') {
                content = `
                    <div class="feature-card scale-hover">
                        <div class="card-header bg-orange">Letter of the Day</div>
                        <div class="card-body"><h1 style="color:var(--orange)">A</h1><p>A is for Apple 🍎</p><button class="btn-play bg-orange">Learn More 🔊</button></div>
                    </div>
                    <div class="feature-card scale-hover">
                        <div class="card-header bg-green">Let's Count!</div>
                        <div class="card-body"><h1 style="color:var(--green)">123</h1><p>What comes next?</p><button class="btn-play bg-green" onclick="location.href='game_count.html'">Play Now 🎮</button></div>
                    </div>
                    <div class="feature-card scale-hover">
                        <div class="card-header bg-blue">Memory Fun</div>
                        <div class="card-body"><h1>🧠</h1><p>Find the match!</p><button class="btn-play bg-blue" onclick="location.href='game_memory.html'">Flip Cards 🃏</button></div>
                    </div>
                `;
            } else { // big-kid (5+)
                content = `
                    <div class="feature-card scale-hover">
                        <div class="card-header bg-dark">Word Master</div>
                        <div class="card-body"><h1 style="color:var(--dark)">H-I!</h1><p>Spell the word!</p><button class="btn-play bg-dark">Spell check 🔊</button></div>
                    </div>
                    <div class="feature-card scale-hover">
                        <div class="card-header bg-teal">Future Artist</div>
                        <div class="card-body"><h1 style="color:var(--teal)">🖌️</h1><p>Draw a house!</p><button class="btn-play bg-teal" onclick="location.href='trace.html'">Draw 🎨</button></div>
                    </div>
                    <div class="feature-card scale-hover" onclick="location.href='worlds.html'">
                        <div class="card-header bg-purple">Little Worlds 🌐</div>
                        <div class="card-body"><h1>🏃</h1><p>The Kids Roblox!</p><button class="btn-play bg-purple">Play Worlds 🎮</button></div>
                    </div>
                    <div class="feature-card scale-hover">
                        <div class="card-header bg-blue">Math Quest</div>
                        <div class="card-body"><h1 style="color:var(--blue)">2 + 2 = ?</h1><p>Try the challenge!</p><button class="btn-play bg-blue" onclick="location.href='game_math.html'">Solve 🪄</button></div>
                    </div>
                `;
            }
            grid.innerHTML = content;
        });
    </script>
</body>
</html>
