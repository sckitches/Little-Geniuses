<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logic Patterns - Little Genius Academyes</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .pattern-card {
            background: white;
            padding: 3rem;
            border-radius: 40px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            max-width: 800px;
            margin: 2rem auto;
            border: 10px solid var(--dark);
        }
        .pattern-display {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        .pattern-item {
            font-size: 5rem;
            padding: 1rem;
            background: #f8fafc;
            border-radius: 20px;
            border: 4px solid #eee;
        }
        .target-slot {
            border: 4px dashed var(--dark);
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            background: #e2e8f0;
        }
        .choices-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
        }
        .choice-btn {
            font-size: 4rem;
            padding: 1.5rem;
            border-radius: 20px;
            border: 4px solid #eee;
            background: white;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }
        .choice-btn:hover {
            transform: scale(1.1);
            border-color: var(--purple);
        }
    </style>
</head>
<body class="bg-clouds bg-dark">
    <nav class="top-nav">
        <div class="logo">
            <span class="mascot" onclick="window.location.href='index.html'">🐵</span> Little Genius Academyes
        </div>
        <div class="nav-links">
            <a href="games.html" class="nav-btn bg-red">⬅ Games</a>
        </div>
    </nav>

    <main class="container text-center">
        <header style="margin-top:2rem;">
            <h1 class="rainbow-text" style="font-size:3.5rem;">Pattern Builder! 📐</h1>
            <p style="color:white; font-size:1.5rem; text-shadow:2px 2px 4px rgba(0,0,0,0.2);">What comes next in the line?</p>
        </header>

        <div class="pattern-card">
            <div id="patternStrip" class="pattern-display">
                <!-- Emojis A, B, A, B, ? -->
            </div>
            
            <p style="margin-bottom:1rem; font-weight:bold; color:#666;">Pick the right one below!</p>
            <div id="choices" class="choices-grid">
                <!-- Generated by JS -->
            </div>
        </div>

        <div id="feedback" style="font-size: 2rem; margin-top: 2rem; min-height: 3rem; color: white;"></div>
    </main>

    <script src="script.js"></script>
    <script>
        const symbols = ["🍎", "🍐", "🍊", "🍇", "🍓", "🍒", "🥝", "🍍", "🐘", "🦁", "🦒", "🦓", "🐶", "🐱", "🐵", "🦁"];
        let nextSymbol = "";

        function nextRound() {
            const strip = document.getElementById('patternStrip');
            const choiceBox = document.getElementById('choices');
            const feedback = document.getElementById('feedback');
            
            strip.innerHTML = "";
            choiceBox.innerHTML = "";
            feedback.innerText = "";

            // Pick two random symbols for the ABAB pattern
            const symA = symbols[Math.floor(Math.random() * symbols.length)];
            let symB = symbols[Math.floor(Math.random() * symbols.length)];
            while (symB === symA) symB = symbols[Math.floor(Math.random() * symbols.length)];

            const pattern = [symA, symB, symA, symB];
            nextSymbol = symA; // Pattern is ABAB A

            pattern.forEach(sym => {
                const div = document.createElement('div');
                div.className = "pattern-item";
                div.innerText = sym;
                strip.appendChild(div);
            });

            // Target Slot
            const target = document.createElement('div');
            target.className = "pattern-item target-slot";
            target.innerText = "?";
            strip.appendChild(target);

            // Choices
            const options = [nextSymbol];
            while (options.length < 4) {
               const rand = symbols[Math.floor(Math.random() * symbols.length)];
               if (!options.includes(rand)) options.push(rand);
            }
            options.sort(() => Math.random() - 0.5);

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "choice-btn";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, btn);
                choiceBox.appendChild(btn);
            });
        }

        function checkAnswer(selected, button) {
            const feedback = document.getElementById('feedback');
            const btns = document.querySelectorAll('.choice-btn');
            btns.forEach(b => b.style.pointerEvents = 'none');

            document.querySelector('.target-slot').innerText = nextSymbol;

            if (selected === nextSymbol) {
                feedback.innerText = "Wow! You're a Logic Genius! 🧠✨";
                button.style.borderColor = "var(--green)";
                button.style.background = "#dcfce7";
                createConfetti(button);
            } else {
                feedback.innerText = "Nice try! The pattern repeats! 🔄";
                button.style.borderColor = "var(--red)";
                button.style.background = "#fee2e2";
                // Color the correct one
                btns.forEach(b => {
                    if (b.innerText === nextSymbol) b.style.borderColor = "var(--green)";
                });
            }

            setTimeout(nextRound, 2500);
        }

        // Initial ROUND
        nextRound();
    </script>
</body>
</html>
