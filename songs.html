<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Songs - Little Genius Academy Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="logo.png">
</head>
<body class="bg-clouds bg-purple">
    <!-- Navigation -->
    <nav class="top-nav">
        <a href="index.html" class="logo">
            <img src="logo.png" alt="Little Genius Academy Academy Logo" class="logo-img">
            Little Genius Academy Academy
        </a>
        <div class="nav-links">
            <a href="index.html" class="nav-btn bg-red">Home</a>
            <a href="alphabets.html" class="nav-btn bg-orange">ABC</a>
            <a href="numbers.html" class="nav-btn bg-yellow">123</a>
            <a href="animals.html" class="nav-btn bg-green">Animals</a>
            <a href="shapes.html" class="nav-btn bg-blue">Shapes</a>
            <button class="menu-toggle" onclick="toggleMenu()">More ▼</button>
        </div>
        <!-- Extended menu -->
        <div class="dropdown-menu" id="extendedMenu">
            <a href="songs.html" class="nav-btn bg-purple">Songs</a>
            <a href="games.html" class="nav-btn bg-pink">Games</a>
            <a href="story.html" class="nav-btn bg-teal">Story</a>
            <a href="ar.html" class="nav-btn bg-orange">AR Mode</a>
            <a href="routine.html" class="nav-btn bg-blue">Daily Routine</a>
            <a href="dashboard.html" class="nav-btn bg-dark">Parents</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container">
        <header class="text-center" style="margin: 2rem 0;">
            <h1 class="rainbow-text" style="font-size:3.5rem; color:white;">Sing-Along Songs 🎵</h1>
            <h2 style="color:white; font-family:'Quicksand'">Watch your favorite videos and sing along!</h2>
        </header>

        <div id="songsGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; margin:2rem 0;">
            <!-- Generated by JS -->
        </div>

    </main>

    <!-- Video Modal -->
    <div id="karaokeModal" style="position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:2000; display:none; flex-direction:column; align-items:center; justify-content:center; color:white; padding:1rem;">
        <div style="width: 100%; max-width: 900px; position:relative;">
            <button onclick="stopKaraoke()" style="position:absolute; -top:50px; right:0; background:var(--red); color:white; border:none; border-radius:50%; width:50px; height:50px; font-size:1.5rem; cursor:pointer; z-index:2100; margin-bottom: 10px;">✕</button>
            <h2 id="kTitle" style="font-family:'Fredoka One'; margin-bottom: 15px; text-align:center;">Song Title</h2>
            
            <div id="videoContainer" style="position:relative; padding-bottom:56.25%; height:0; border-radius:20px; overflow:hidden; border: 8px solid white;">
                <!-- YouTube Iframe injected here -->
            </div>
            
            <div id="kLyrics" style="margin-top:20px; font-size:1.8rem; font-family:'Quicksand'; text-align:center; background:rgba(255,255,255,0.1); padding:1rem; border-radius:15px;">
                Sing and dance! 🕺💃
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="songs.js"></script>
    <script>
        const grid = document.getElementById('songsGrid');
        songs.forEach((song, index) => {
            const card = document.createElement('div');
            card.className = "feature-card scale-hover";
            card.style.borderColor = song.color || "var(--purple)";
            card.style.cursor = "pointer";
            card.onclick = () => {
                createConfetti(card);
                startKaraoke(index);
            };

            card.innerHTML = `
                <div class="card-body" style="background:${song.color || "var(--purple)"}; color:white; border-radius:inherit; padding: 2rem;">
                    <h1 style="font-size: 6rem; margin-bottom: 10px;">${song.emoji}</h1>
                    <h3 style="font-size: 1.8rem; font-family:'Fredoka One';">${song.title}</h3>
                    <p style="margin: 10px 0;">Tap to watch! 📺</p>
                    <button class="btn-play" style="background:white; color:${song.color}">Play Now 🎤</button>
                </div>
            `;
            grid.appendChild(card);
        });

        function startKaraoke(index) {
            const song = songs[index];
            const modal = document.getElementById('karaokeModal');
            const kTitle = document.getElementById('kTitle');
            const videoContainer = document.getElementById('videoContainer');
            const kLyrics = document.getElementById('kLyrics');

            modal.style.display = 'flex';
            kTitle.innerText = song.title;
            
            // Inject YouTube Iframe
            videoContainer.innerHTML = `
                <iframe 
                    style="position:absolute; top:0; left:0; width:100%; height:100%;" 
                    src="https://www.youtube.com/embed/${song.youtubeId}?autoplay=1&rel=0" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
                </iframe>
            `;

            kLyrics.innerText = "Singing: " + song.title + "! 🎶";
            speak("Let's sing " + song.title + "!");
        }

        function stopKaraoke() {
            const videoContainer = document.getElementById('videoContainer');
            videoContainer.innerHTML = ''; // Stops the video
            document.getElementById('karaokeModal').style.display = 'none';
        }

        function speak(t) {
            const u = new SpeechSynthesisUtterance(t);
            u.pitch = 1.2;
            window.speechSynthesis.speak(u);
        }
    </script>
</body>
</html>
