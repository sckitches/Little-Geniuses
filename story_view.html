<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Viewer - Little Genius Academyes</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .story-container {
            background: white;
            padding: 3rem;
            border-radius: 30px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            max-width: 800px;
            margin: 2rem auto;
            text-align: left;
            border: 5px solid var(--teal);
        }
        .story-text {
            font-family: 'Quicksand', sans-serif;
            font-size: 1.5rem;
            line-height: 2;
            color: #333;
            margin-top: 1.5rem;
        }
        .btn-narrate {
            background: var(--purple);
            color: white;
            font-size: 1.5rem;
            padding: 1rem 2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 0 #3c1685;
            transition: transform 0.1s, box-shadow 0.1s;
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 2rem auto 0;
        }
        .btn-narrate:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 #3c1685;
        }
    </style>
</head>
<body class="bg-clouds bg-teal">
    <!-- Navigation -->
    <nav class="top-nav" style="background:#fffafa;">
        <div class="logo">
            <span class="mascot" onclick="window.location.href='index.html'">🐵</span> Little Genius Academyes
        </div>
        <div class="nav-links">
            <a href="story.html" class="nav-btn bg-red">⬅ Back to Stories</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container text-center">
        <h1 class="rainbow-text" style="font-size: 3rem; color: white; margin-top: 2rem;" id="storyTitle">Loading Story...</h1>
        
        <div class="story-container">
            <!-- Book Image (only shown for books) -->
            <div id="bookImageContainer" style="display:none; margin-bottom: 2rem;">
                <img id="bookImage" src="" style="width:100%; border-radius:15px; border:5px solid var(--teal); box-shadow:0 10px 20px rgba(0,0,0,0.1);">
            </div>

            <div id="storyEmoji" style="font-size: 5rem; text-align: center; margin-bottom: 1rem;">📖</div>
            <div id="storyContent" class="story-text">
                Loading...
            </div>
            
            <!-- Interactive Options / Book Buttons -->
            <div id="optionsContainer" style="display: flex; flex-direction: column; gap: 1rem; margin-top: 2rem;">
                <!-- Generated by JS -->
            </div>

            <button class="btn-narrate" id="readBtn" onclick="readStory()">
                <span>Narrate Page 🔊</span>
            </button>
        </div>
    </main>

    <script src="script.js"></script>
    <script src="stories.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const storyId = urlParams.get('id');
        const storyType = urlParams.get('type') || 'interactive';
        
        let currentStory;
        let currentNodeKey;
        let currentPageIndex = 0;

        if (storyType === 'book') {
            currentStory = storyData.books[storyId] || storyData.books.colors;
            renderBookPage(0);
        } else {
            currentStory = storyData.interactive[storyId] || storyData.interactive.space;
            renderNode(currentStory.startNode || "start");
        }

        // --- INTERACTIVE STORY LOGIC ---
        function renderNode(nodeKey) {
            currentNodeKey = nodeKey;
            const node = currentStory.nodes[nodeKey];
            
            document.getElementById('storyTitle').innerText = currentStory.title;
            document.getElementById('storyEmoji').innerText = currentStory.emoji;
            document.getElementById('storyContent').innerText = node.text;

            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';

            if (node.options) {
                node.options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = "nav-btn bg-orange";
                    btn.style.width = "100%";
                    btn.style.border = "none";
                    btn.style.cursor = "pointer";
                    btn.style.fontSize = "1.2rem";
                    btn.style.padding = "1rem";
                    btn.innerText = opt.text;
                    btn.onclick = () => {
                        createConfetti(btn);
                        setTimeout(() => renderNode(opt.next), 500);
                    };
                    optionsContainer.appendChild(btn);
                });
            }
            resetNarrationUI();
        }

        // --- PICTURE BOOK LOGIC ---
        function renderBookPage(index) {
            currentPageIndex = index;
            const page = currentStory.pages[index];
            
            document.getElementById('storyTitle').innerText = currentStory.title;
            const bookImgContainer = document.getElementById('bookImageContainer');
            const storyEmoji = document.getElementById('storyEmoji');

            if (page.img) {
                bookImgContainer.style.display = 'block';
                storyEmoji.style.display = 'none';
                document.getElementById('bookImage').src = page.img;
            } else {
                bookImgContainer.style.display = 'none';
                storyEmoji.style.display = 'block';
                storyEmoji.innerText = page.emoji || "📖";
                storyEmoji.style.fontSize = "12rem";
            }

            document.getElementById('storyContent').innerText = page.text;

            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';

            // Navigation Buttons
            const navBox = document.createElement('div');
            navBox.style.display = 'flex';
            navBox.style.gap = '1rem';
            
            if (index > 0) {
                const prevBtn = document.createElement('button');
                prevBtn.className = "nav-btn bg-blue";
                prevBtn.innerText = "⬅ Previous";
                prevBtn.style.flex = "1";
                prevBtn.onclick = () => renderBookPage(index - 1);
                navBox.appendChild(prevBtn);
            }

            if (index < currentStory.pages.length - 1) {
                const nextBtn = document.createElement('button');
                nextBtn.className = "nav-btn bg-green";
                nextBtn.innerText = "Next Page ➡";
                nextBtn.style.flex = "1";
                nextBtn.onclick = () => renderBookPage(index + 1);
                navBox.appendChild(nextBtn);
            } else {
                const finishBtn = document.createElement('button');
                finishBtn.className = "nav-btn bg-yellow";
                finishBtn.innerText = "Read Again 🔁";
                finishBtn.style.flex = "1";
                finishBtn.style.color = "var(--dark)";
                finishBtn.onclick = () => renderBookPage(0);
                navBox.appendChild(finishBtn);
            }

            optionsContainer.appendChild(navBox);
            resetNarrationUI();
        }

        // --- COMMON LOGIC ---
        function resetNarrationUI() {
            if (isSpeaking) {
                window.speechSynthesis.cancel();
                isSpeaking = false;
                document.getElementById('readBtn').innerHTML = "<span>Narrate Page 🔊</span>";
            }
        }

        let isSpeaking = false;
        function readStory() {
            if (isSpeaking) {
                window.speechSynthesis.cancel();
                isSpeaking = false;
                document.getElementById('readBtn').innerHTML = "<span>Narrate Page 🔊</span>";
                return;
            }

            let textToRead = "";
            if (storyType === 'book') {
                textToRead = currentStory.pages[currentPageIndex].text;
            } else {
                textToRead = currentStory.nodes[currentNodeKey].text;
            }

            const msg = new SpeechSynthesisUtterance();
            msg.text = textToRead;
            msg.volume = 1;
            msg.rate = 1.0; 
            msg.pitch = 1.1; 
            
            msg.onend = function() {
                isSpeaking = false;
                document.getElementById('readBtn').innerHTML = "<span>Narrate Page 🔊</span>";
            };

            window.speechSynthesis.speak(msg);
            isSpeaking = true;
            document.getElementById('readBtn').innerHTML = "<span>Stop Reading 🛑</span>";
        }
    </script>
</body>
</html>
