<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Kingdom - Little Genius Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="logo.png">
    <style>
        body { background: #55efc4; color: #2d3436; overflow-x: hidden; }
        
        .animal-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Mode Switcher */
        .mode-nav {
            background: white;
            padding: 20px;
            border-radius: 50px;
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .mode-btn {
            padding: 15px 40px;
            border-radius: 30px;
            border: none;
            font-family: 'Fredoka One';
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .mode-btn.active { background: #00b894; color: white; transform: scale(1.1); }

        /* The BIG Animal Grid */
        .animal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 40px;
        }

        .giant-animal-card {
            background: white;
            border-radius: 50px;
            padding: 40px;
            text-align: center;
            border: 10px solid white;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .giant-animal-card:hover { transform: scale(1.08) translateY(-10px); border-color: #ffeaa7; }
        .animal-emoji { font-size: 10rem; margin-bottom: 20px; filter: drop-shadow(0 15px 15px rgba(0,0,0,0.1)); }
        .animal-name { font-family: 'Fredoka One'; font-size: 3rem; color: #00b894; }

        /* Habitat Explorer Mode */
        #habitatExplorer {
            display: none;
            background: white;
            border-radius: 60px;
            padding: 50px;
            animation: slideUp 0.6s forwards;
            min-height: 80vh;
            border: 15px solid #00d2d3;
        }

        .habitat-nav {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            margin-bottom: 40px;
            padding-bottom: 10px;
        }

        .habitat-chip {
            padding: 15px 30px;
            background: #f1f2f6;
            border-radius: 20px;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            white-space: nowrap;
        }
        .habitat-chip.active { background: #00d2d3; color: white; }

        .book-container {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 40px;
            align-items: start;
        }

        .book-page {
            background: #fffafa;
            border-radius: 40px;
            padding: 40px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.05);
            min-height: 500px;
            position: relative;
        }

        .page-header { font-family: 'Fredoka One'; font-size: 3.5rem; margin-bottom: 20px; color: #0984e3; }
        .page-text { font-size: 1.8rem; font-family: 'Quicksand'; line-height: 1.6; color: #333; }
        
        .book-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
        }
        .page-btn {
            background: #00d2d3;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .quiz-option {
            background: #fff;
            border: 4px solid #00d2d3;
            color: #00d2d3;
            padding: 15px;
            border-radius: 20px;
            font-family: 'Fredoka One';
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
            transition: 0.3s;
        }
        .quiz-option:hover { background: #00d2d3; color: white; }

        @keyframes slideUp { from { transform: translateY(100px); opacity:0; } to { transform: translateY(0); opacity:1; } }

        /* ❄️ SNOWFLAKE EFFECT */
        #snowContainer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9999;
            display: none;
        }
        @keyframes snowfall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0.2; }
        }
        .snowflake {
            position: absolute;
            top: -30px;
            color: white;
            font-size: 1.5rem;
            animation: snowfall linear infinite;
            opacity: 0.8;
            text-shadow: 0 0 6px rgba(200,240,255,0.9);
        }

        /* ❄️ ARCTIC THEME OVERRIDE */
        body.arctic-mode {
            background: linear-gradient(135deg, #74b9ff, #a29bfe, #dfe6e9);
            transition: background 1s;
        }
        body.arctic-mode #habitatExplorer {
            background: linear-gradient(180deg, #ebf4fd, #dfe6e9);
            border-color: #74b9ff;
        }
        body.arctic-mode .page-header { color: #0984e3; }
        body.arctic-mode .book-page {
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(116,185,255,0.3), inset 0 0 20px rgba(0,0,0,0.04);
        }
        body.arctic-mode .page-btn {
            background: linear-gradient(90deg, #74b9ff, #0984e3);
        }
        body.arctic-mode .habitat-chip.active { background: #0984e3; }
        body.arctic-mode #habitatArt {
            filter: drop-shadow(0 0 20px rgba(116,185,255,0.8));
        }

        /* Ice Crystal Badge */
        .ice-badge {
            display: inline-block;
            background: linear-gradient(135deg, #74b9ff, #a29bfe);
            color: white;
            border-radius: 20px;
            padding: 5px 15px;
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <a href="index.html" class="logo">
            <img src="logo.png" alt="Logo" class="logo-img">
            Little Genius Academy
        </a>
    </nav>

    <main class="animal-container">
        <header class="text-center" style="margin: 3rem 0;">

            <div class="mode-nav">
                <button class="mode-btn active" id="btnToddler" onclick="switchMode('toddler')">Toddler Mode (Huge!)</button>
                <button class="mode-btn" id="btnExplorer" onclick="switchMode('explorer')">Habitat Encyclopedia (5+ Pages!)</button>
            </div>
        </header>

        <!-- Toddler Mode Grid -->
        <div class="animal-grid" id="animalGrid"></div>

        <!-- Habitat Explorer Mode (Book) -->
        <div id="habitatExplorer">
            <div class="habitat-nav" id="habitatNav"></div>
            
            <div class="book-container">
                <div id="habitatArt" style="font-size: 20rem; text-align:center; animation: bounce 3s infinite;">🌴</div>
                
                <div class="book-page">

                    <div id="quizBox" style="display:none; margin-top: 20px;"></div>
                    
                    <div class="book-controls">
                        <button class="page-btn" id="prevBtn" onclick="prevPage()">⬅ Back</button>
                        <span id="pageCounter" style="font-weight:bold; font-size:1.5rem;">Page 1 of 10</span>
                        <button class="page-btn" id="nextBtn" onclick="nextPage()">Next ➡️</button>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- Snowflake Container -->
    <div id="snowContainer"></div>

    <script src="script.js"></script>

        let activeHabitat = null;
        let pidx = 0;

        function initAnimals() {
            const grid = document.getElementById('animalGrid');
            grid.innerHTML = "";
            for(let i=0; i<100; i++) {
                const ani = animalList[i % animalList.length];
                const card = document.createElement('div');
                card.className = "giant-animal-card";
                card.style.borderColor = ani.color;
                card.onclick = () => { speak(ani.name); createConfetti(card); };
                card.innerHTML = `<div class="animal-emoji" style="font-size: 12rem;">${ani.emoji}</div><div class="animal-name" style="font-size: 4rem;">${ani.name}</div>`;
                grid.appendChild(card);
            }
        }

        function switchMode(mode) {
            const grid = document.getElementById('animalGrid');
            const habitat = document.getElementById('habitatExplorer');
            const btnT = document.getElementById('btnToddler');
            const btnE = document.getElementById('btnExplorer');
            if(mode === 'toddler') {
                grid.style.display = 'grid'; habitat.style.display = 'none';
                btnT.classList.add('active'); btnE.classList.remove('active');
            } else {
                grid.style.display = 'none'; habitat.style.display = 'block';
                btnT.classList.remove('active'); btnE.classList.add('active');
                initHabitats();
            }
        }

        function initHabitats() {
            const nav = document.getElementById('habitatNav');
            nav.innerHTML = "";
            habitats.forEach(h => {
                const chip = document.createElement('div');
                chip.className = "habitat-chip";
                chip.style.borderLeft = `5px solid ${h.color}`;
                chip.innerText = h.icon + " " + h.name;
                chip.onclick = () => loadBook(h);
                nav.appendChild(chip);
            });
            if(!activeHabitat) loadBook(habitats[0]);
        }

        function loadBook(h) {
            activeHabitat = h;
            pidx = 0;
            document.getElementById('habitatArt').innerText = h.icon;

            // ❄️ Arctic / Ice mode toggle
            if (h.icy) {
                document.body.classList.add('arctic-mode');
                document.getElementById('snowContainer').style.display = 'block';
                document.getElementById('iceBadge').style.display = 'inline-block';
                generateSnow();
            } else {
                document.body.classList.remove('arctic-mode');
                document.getElementById('snowContainer').style.display = 'none';
                document.getElementById('iceBadge').style.display = 'none';
                document.getElementById('snowContainer').innerHTML = '';
            }

            // Update nav chip active states
            document.querySelectorAll('.habitat-chip').forEach((chip, i) => {
                chip.classList.toggle('active', habitats[i] === h);
            });

            updateBook();
            speak("Welcome to the " + h.name + " book!");
        }

        function generateSnow() {
            const container = document.getElementById('snowContainer');
            container.innerHTML = '';
            const flakes = ['❄️','🌨️','❅','❆','✦','⋆'];
            for (let i = 0; i < 40; i++) {
                const flake = document.createElement('div');
                flake.className = 'snowflake';
                flake.innerText = flakes[Math.floor(Math.random() * flakes.length)];
                flake.style.left = (Math.random() * 100) + 'vw';
                flake.style.fontSize = (0.8 + Math.random() * 1.5) + 'rem';
                flake.style.animationDuration = (4 + Math.random() * 8) + 's';
                flake.style.animationDelay = (-Math.random() * 8) + 's';
                flake.style.opacity = (0.4 + Math.random() * 0.6).toString();
                container.appendChild(flake);
            }
        }

        function updateBook() {
            const totalPages = activeHabitat.pages.length;
            const p = activeHabitat.pages[pidx];
            document.getElementById('pageTitle').innerText = p.t;
            document.getElementById('pageContent').innerText = p.c;
            document.getElementById('pageCounter').innerText = `Page ${pidx + 1} of ${totalPages}`;
            document.getElementById('prevBtn').style.opacity = pidx === 0 ? "0.3" : "1";
            document.getElementById('nextBtn').innerText = pidx === totalPages - 1 ? "Finish! 🏁" : "Next ➡️";

            // Quiz logic
            const quizBox = document.getElementById('quizBox');
            if (p.options) {
                quizBox.style.display = 'block';
                quizBox.innerHTML = '';
                p.options.forEach((opt, idx) => {
                    const btn = document.createElement('button');
                    btn.className = "quiz-option";
                    btn.innerText = opt;
                    btn.onclick = () => checkQuiz(idx, p.correct, btn);
                    quizBox.appendChild(btn);
                });
            } else {
                quizBox.style.display = 'none';
            }
        }

        function checkQuiz(selected, correct, btn) {
            if (selected === correct) {
                btn.style.background = "#00d2d3";
                btn.style.color = "white";
                speak("Correct! You are amazing!");
                createConfetti(btn);
            } else {
                btn.style.background = "#ff7675";
                btn.style.color = "white";
                speak("Oops! Try another one!");
                setTimeout(() => {
                    btn.style.background = "#fff";
                    btn.style.color = "#00d2d3";
                }, 1000);
            }
        }

        function nextPage() {
            const total = activeHabitat.pages.length;
            if(pidx < total - 1) { 
                pidx++; 
                updateBook(); 
                speak(activeHabitat.pages[pidx].t); 
            } else { 
                const msg = activeHabitat.icy 
                    ? "Incredible! You completed the ice book! You are a Frozen Explorer!" 
                    : "You finished the book! You are an expert!";
                speak(msg); 
                createConfetti(document.getElementById('habitatExplorer')); 
            }
        }

        function prevPage() {
            if(pidx > 0) { pidx--; updateBook(); }
        }

        function speak(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.pitch = 1.2;
            window.speechSynthesis.speak(u);
        }

        initAnimals();
    </script>
</body>
</html>
