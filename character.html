<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Your Hero - Little Genius Academy Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { 
            background: linear-gradient(135deg, #1e3799 0%, #0c2461 100%);
            min-height: 100vh;
            color: white;
            text-align: center;
        }

        .selection-title {
            padding: 50px 20px;
            font-family: 'Fredoka One';
            font-size: 4rem;
            text-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        .character-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 40px;
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .char-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 40px 20px;
            border: 4px solid rgba(255,255,255,0.2);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .char-card:hover {
            transform: scale(1.1) rotate(2deg);
            background: rgba(255,255,255,0.2);
            border-color: #f6b93b;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .char-emoji {
            font-size: 8rem;
            margin-bottom: 20px;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.2));
            transition: transform 0.3s;
        }

        .char-card:hover .char-emoji {
            transform: scale(1.2) translateY(-10px);
        }

        .char-name {
            font-family: 'Fredoka One';
            font-size: 2rem;
            margin-bottom: 10px;
            color: #f6b93b;
        }

        .char-ability {
            font-weight: 700;
            opacity: 0.8;
            font-family: 'Quicksand';
        }

        .selected-ring {
            position: absolute;
            inset: -10px;
            border: 8px solid #f6b93b;
            border-radius: 50px;
            display: none;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        .btn-confirm {
            margin-top: 50px;
            padding: 20px 60px;
            font-size: 2.5rem;
            background: #f6b93b;
            color: #0c2461;
            border-radius: 50px;
            font-family: 'Fredoka One';
            border: none;
            box-shadow: 0 10px 0 #b38914;
            cursor: pointer;
            display: none;
        }
    </style>
</head>
<body>

    <h1 class="selection-title rainbow-text">Choose Your Hero!</h1>
    <p style="font-size: 1.5rem; font-weight: 700;">Who will explore the Little Worlds today?</p>

    <div class="character-grid" id="charGrid">
        <!-- Generated by JS -->
    </div>

    <button class="btn-confirm" id="confirmBtn" onclick="saveCharacter()">Let's Go! 🚀</button>

    <script src="script.js"></script>
    <script>
        const squad = [
            { id: 'monkey', name: 'Turbo Monkey', emoji: '🐵', ability: 'Super Jumper' },
            { id: 'dino', name: 'Dino Dash', emoji: '🦖', ability: 'Speed Runner' },
            { id: 'robot', name: 'Robo-Buddy', emoji: '🤖', ability: 'Logic Master' },
            { id: 'panda', name: 'Star Panda', emoji: '🐼', ability: 'Confetti Power' },
            { id: 'cat', name: 'Magic Cat', emoji: '🐱', ability: 'Glow Vision' },
            { id: 'cow', name: 'Space Cow', emoji: '🐮', ability: 'Moon Walker' },
            { id: 'frog', name: 'Ninja Frog', emoji: '🐸', ability: 'Wall Jump' },
            { id: 'bear', name: 'Honey Bear', emoji: '🐻', ability: 'Super Strength' }
        ];

        let selectedId = null;
        const grid = document.getElementById('charGrid');

        squad.forEach(char => {
            const card = document.createElement('div');
            card.className = "char-card";
            card.id = `card-${char.id}`;
            card.onclick = () => selectChar(char, card);

            card.innerHTML = `
                <div class="selected-ring" id="ring-${char.id}"></div>
                <div class="char-emoji">${char.emoji}</div>
                <div class="char-name">${char.name}</div>
                <div class="char-ability">✨ ${char.ability}</div>
            `;
            grid.appendChild(card);
        });

        function selectChar(char, card) {
            selectedId = char.id;
            
            // UI cleanup
            document.querySelectorAll('.selected-ring').forEach(r => r.style.display = 'none');
            document.getElementById(`ring-${char.id}`).style.display = 'block';
            
            document.getElementById('confirmBtn').style.display = 'inline-block';
            speak(`${char.name} selected! ${char.ability}!`);
        }

        function saveCharacter() {
            const char = squad.find(c => c.id === selectedId);
            localStorage.setItem('selectedGeniusHero', JSON.stringify(char));
            
            // Confirm with effect
            createConfetti(document.getElementById(`card-${selectedId}`));
            speak("Ready for adventure! Launching Academy.");
            
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1000);
        }

        function speak(t) {
            const u = new SpeechSynthesisUtterance(t);
            u.pitch = 1.2;
            window.speechSynthesis.speak(u);
        }
    </script>
</body>
</html>
