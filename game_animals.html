<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Sound Quiz - Little Genius Academyes</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .quiz-card {
            background: white;
            padding: 3rem;
            border-radius: 40px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            max-width: 700px;
            margin: 2rem auto;
            border: 10px solid var(--green);
        }
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            margin-top: 2rem;
        }
        .animal-option {
            font-size: 5rem;
            padding: 2rem;
            background: #f8fafc;
            border-radius: 20px;
            border: 4px solid #eee;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        .animal-option:hover {
            transform: scale(1.05);
            background: #f1f5f9;
        }
        .animal-header {
            font-size: 2rem;
            color: var(--dark);
            font-family: 'Fredoka One';
            margin-bottom: 1rem;
        }
        .speaker-btn {
            font-size: 5rem;
            background: var(--purple);
            color: white;
            border: none;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 10px 0 #3c1685;
            transition: transform 0.1s, box-shadow 0.1s;
            margin: 0 auto;
        }
        .speaker-btn:active {
            transform: translateY(10px);
            box-shadow: 0 0 0 #3c1685;
        }
        .pulse { animation: pulseAnim 1.5s infinite; }
        @keyframes pulseAnim {
            0% { transform: scale(1); box-shadow: 0 0 0 rgba(95,39,205,0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 20px rgba(95,39,205,0.4); }
            100% { transform: scale(1); box-shadow: 0 0 0 rgba(95,39,205,0.4); }
        }
    </style>
</head>
<body class="bg-clouds bg-green">
    <nav class="top-nav">
        <div class="logo">
            <span class="mascot" onclick="window.location.href='index.html'">🐵</span> Little Genius Academyes
        </div>
        <div class="nav-links">
            <a href="games.html" class="nav-btn bg-red">⬅ Games</a>
        </div>
    </nav>

    <main class="container text-center">
        <header style="margin-top:2rem;">
            <h1 class="rainbow-text" style="font-size:3.5rem;">Who is that? 🦁</h1>
            <p style="color:white; font-size:1.5rem; text-shadow:2px 2px 4px rgba(0,0,0,0.2);">Listen and pick the right friend!</p>
        </header>

        <div class="quiz-card">
            <button class="speaker-btn pulse" onclick="playCurrentWord()">🔊</button>
            <p style="margin-top:1rem; font-weight:bold; color:#666;">Tap the speaker to hear the name!</p>
            
            <div id="options" class="options-grid">
                <!-- Generated by JS -->
            </div>
        </div>

        <div id="feedback" style="font-size: 2rem; margin-top: 2rem; min-height: 3rem; color: white; text-shadow: 2px 2px 5px rgba(0,0,0,0.2);"></div>
    </main>

    <script src="script.js"></script>
    <script>
        const animals = [
            { emoji: "🐶", name: "Dog" },
            { emoji: "🐱", name: "Cat" },
            { emoji: "🦁", name: "Lion" },
            { emoji: "🐘", name: "Elephant" },
            { emoji: "🐄", name: "Cow" },
            { emoji: "🐷", name: "Pig" },
            { emoji: "🐑", name: "Sheep" },
            { emoji: "🐸", name: "Frog" },
            { emoji: "🐵", name: "Monkey" },
            { emoji: "🐯", name: "Tiger" }
        ];

        let currentTarget = null;
        let score = 0;

        function nextRound() {
            const grid = document.getElementById('options');
            const feedback = document.getElementById('feedback');
            grid.innerHTML = "";
            feedback.innerText = "";

            // Pick 4 random animals
            const shuffled = [...animals].sort(() => 0.5 - Math.random());
            const selection = shuffled.slice(0, 4);
            currentTarget = selection[Math.floor(Math.random() * 4)];

            selection.forEach(animal => {
                const div = document.createElement('div');
                div.className = "animal-option scale-hover";
                div.innerText = animal.emoji;
                div.onclick = () => checkAnswer(animal, div);
                grid.appendChild(div);
            });

            // Auto-play the target name
            setTimeout(playCurrentWord, 500);
        }

        function playCurrentWord() {
            if (!currentTarget) return;
            const msg = new SpeechSynthesisUtterance(currentTarget.name);
            msg.pitch = 1.2;
            msg.rate = 0.9;
            window.speechSynthesis.speak(msg);
        }

        function checkAnswer(selected, element) {
            const feedback = document.getElementById('feedback');
            const options = document.querySelectorAll('.animal-option');
            options.forEach(opt => opt.style.pointerEvents = 'none');

            if (selected.name === currentTarget.name) {
                element.style.borderColor = "var(--green)";
                element.style.background = "#dcfce7";
                feedback.innerText = "Excellent! ✨ It's the " + selected.name + "!";
                createConfetti(element);
                score++;
            } else {
                element.style.borderColor = "var(--red)";
                element.style.background = "#fee2e2";
                feedback.innerText = "Oops! That's the " + selected.name + ". 🍎";
                // Color the correct one
                options.forEach(opt => {
                    if (opt.innerText === currentTarget.emoji) opt.style.borderColor = "var(--green)";
                });
            }

            setTimeout(nextRound, 2000);
        }

        // Initial Start
        nextRound();
    </script>
</body>
</html>
