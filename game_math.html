<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Quest - Little Genius Academyes</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .math-card {
            background: white;
            padding: 3rem;
            border-radius: 40px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: 2rem auto;
            border: 10px solid var(--blue);
        }
        .problem {
            font-size: 5rem;
            color: var(--dark);
            margin-bottom: 2rem;
            font-family: 'Fredoka One';
        }
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }
        .option-btn {
            padding: 1.5rem;
            font-size: 2.5rem;
            border-radius: 20px;
            border: none;
            background: #f1f5f9;
            color: var(--dark);
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 8px 0 #cbd5e1;
        }
        .option-btn:hover {
            transform: scale(1.05);
            background: #e2e8f0;
        }
        .option-btn:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 #cbd5e1;
        }
        .correct { background: var(--green) !important; color: white !important; box-shadow: 0 8px 0 #10ac84 !important; }
        .wrong { background: var(--red) !important; color: white !important; box-shadow: 0 8px 0 #d63031 !important; }
        
        .score-box {
            font-size: 1.5rem;
            color: white;
            background: var(--dark);
            padding: 0.5rem 2rem;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body class="bg-clouds bg-blue">
    <nav class="top-nav">
        <a href="index.html" class="logo">
            <img src="logo.png" alt="Logo" class="logo-img">
            Little Genius Academy Academy
        </a>
        <div class="nav-links">
            <a href="games.html" class="nav-btn bg-red">⬅ Games</a>
        </div>
    </nav>

    <main class="container text-center">
        <header style="margin-top:2rem;">
            <div class="score-box">Stars: <span id="score">0</span> ⭐</div>
            <h1 class="rainbow-text" style="font-size:3.5rem;">Math Quest! 🪄</h1>
        </header>

        <div class="math-card" id="gameArea">
            <div class="problem" id="problemText">2 + 2 = ?</div>
            <div id="options" class="options-grid">
                <!-- Generated by JS -->
            </div>
        </div>

        <div id="feedback" style="font-size: 2rem; margin-top: 2rem; min-height: 3rem; color: white; text-shadow: 2px 2px 5px rgba(0,0,0,0.2);"></div>
    </main>

    <script src="script.js"></script>
    <script>
        let score = 0;
        let correctAnswer = 0;

        function nextProblem() {
            const grid = document.getElementById('options');
            const problemText = document.getElementById('problemText');
            const feedback = document.getElementById('feedback');
            
            feedback.innerText = "";
            grid.innerHTML = "";

            // Simple addition for 3-5+ years
            const num1 = Math.floor(Math.random() * 10) + 1;
            const num2 = Math.floor(Math.random() * 5) + 1;
            correctAnswer = num1 + num2;
            
            problemText.innerText = `${num1} + ${num2} = ?`;

            // Generate 4 options
            const options = [correctAnswer];
            while (options.length < 4) {
                const wrong = Math.floor(Math.random() * 15) + 1;
                if (!options.includes(wrong)) options.push(wrong);
            }
            options.sort((a, b) => a - b);

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "option-btn";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, btn);
                grid.appendChild(btn);
            });
        }

        function checkAnswer(selected, button) {
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(b => b.disabled = true);

            if (selected === correctAnswer) {
                score++;
                document.getElementById('score').innerText = score;
                button.classList.add('correct');
                document.getElementById('feedback').innerText = "Magical! ✨ Correct!";
                createConfetti(button);
            } else {
                button.classList.add('wrong');
                document.getElementById('feedback').innerText = "Oops! Try again! 🍎";
                // Show the correct one
                buttons.forEach(b => {
                    if (parseInt(b.innerText) === correctAnswer) b.classList.add('correct');
                });
            }

            setTimeout(nextProblem, 2000);
        }

        // Initial Load
        nextProblem();
    </script>
</body>
</html>
